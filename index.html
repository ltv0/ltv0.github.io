<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LTV Portfolio</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #08121c;
      color: #f6f2df;
      font-family: monospace;
      position: relative;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .overlay-links {
      position: absolute;
      top: 120px;
      left: 40px;
      right: 40px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
      pointer-events: auto;
    }
    .overlay-links a,
    .overlay-links a:visited,
    .overlay-links a:focus,
    .overlay-links a:hover,
    .overlay-links a:active {
      color: #7fd1ff;
      text-decoration: none;
      font-family: monospace;
      font-size: 40px;
      display: inline-block;
    }
    .overlay-links a:hover {
      text-decoration: underline;
    }
    .overlay-links a:focus {
      outline: 2px dashed #7fd1ff;
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <canvas></canvas>

  <div class="overlay-links">
    <a href="https://devpost.com/software/weather-report-2aew5f" target="_blank" rel="noreferrer noopener">Devpost project page</a>
    <a></a>
    <a></a>
    <a></a>
    <a></a>
    <a href="http://ltv0.me/blaster-hack-commandline-game/" target="_blank" rel="noreferrer noopener">Hackathon game link</a>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
